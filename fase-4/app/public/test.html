<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Prueba Widget</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #f8fafc;
    }

    .card {
      text-align: center;
      color: #64748b;
    }

    .card h1 {
      font-size: 1.5rem;
      margin-bottom: 8px;
      color: #1e293b;
    }

    code {
      background: #f1f5f9;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 13px;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Web del cliente</h1>
    <p>El widget aparece abajo a la derecha 👇</p>
    <p>Client ID: <code id="cid"></code></p>
  </div>

  <!--
    En producción el cliente pega esta línea en su web.
    data-client-id viene del panel de admin.
    data-api-url apunta al servidor (en local es el mismo origen).
  -->
  <script src="/public/widget.js" data-client-id="cmnwbu8gi0000u2iniifjkzb0" data-api-url="http://localhost:3000">
  </script>
  <script>
    // Muestra el client-id en la card para referencia
    const s = document.querySelector('script[data-client-id]');
    document.getElementById('cid').textContent = s.getAttribute('data-client-id');
  </script>
</body>

</html>
